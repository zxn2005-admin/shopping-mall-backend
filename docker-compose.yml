services:
  mysql:
    image: mysql:8.0
    container_name: mysql-mall
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-123456}
      - MYSQL_DATABASE=${DB_NAME:-mall}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mall-backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./mall-backend/src/main/resources/db/xxl-job-schema.sql:/docker-entrypoint-initdb.d/02-xxl-job-schema.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --ngram-token-size=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mall-network

  redis:
    image: redis:8.4.0
    container_name: redis-mall
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mall-network

  rabbitmq:
    image: rabbitmq:4.2.4
    container_name: rabbitmq-mall
    hostname: rabbitmq.local
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-123456}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mall-network

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:3.4.0
    container_name: xxl-job-admin
    ports:
      - "${XXL_JOB_ADMIN_PORT:-8088}:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=${DB_USERNAME:-root}
        --spring.datasource.password=${DB_PASSWORD:-123456}
        --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN:-}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/xxl-job-admin/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - xxl-job-logs:/data/applogs
    networks:
      - mall-network

  backend:
    build:
      context: ./mall-backend
      dockerfile: Dockerfile
    container_name: mall-backend
    ports:
      - "${BACKEND_PORT:-25116}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-mall}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - JWT_SECRET=${JWT_SECRET:-b8b43825c73deda2de001ac790281b9e7de2644220c1e5afa412f59f02c3efd5}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-123456}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-123456}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_NOTIFY_URL=${ALIPAY_NOTIFY_URL:-}
      - ALIPAY_RETURN_URL=${ALIPAY_RETURN_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - STRIPE_ENABLED=${STRIPE_ENABLED:-true}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_REFUND_WEBHOOK_SECRET=${STRIPE_REFUND_WEBHOOK_SECRET:-}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL:-}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL:-}
      - STRIPE_TEST_MODE=${STRIPE_TEST_MODE:-true}
      - PRODUCT_IMAGE_BASE_URL=${PRODUCT_IMAGE_BASE_URL:-}
      - XXL_JOB_ADMIN_ADDRESSES=${XXL_JOB_ADMIN_ADDRESSES:-http://xxl-job-admin:8080/xxl-job-admin}
      - XXL_JOB_ACCESS_TOKEN=${XXL_JOB_ACCESS_TOKEN:-}
      - XXL_JOB_EXECUTOR_PORT=${XXL_JOB_EXECUTOR_PORT:-9999}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      xxl-job-admin:
        condition: service_healthy
    networks:
      - mall-network

  frontend:
    build:
      context: ./mall-frontend
      dockerfile: Dockerfile
    container_name: mall-frontend
    ports:
      - "${FRONTEND_PORT:-26115}:80"
    depends_on:
      - backend
    networks:
      - mall-network

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  xxl-job-logs:

networks:
  mall-network:
    driver: bridge
