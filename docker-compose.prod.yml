# 生产环境 override
# 用法: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build
services:
  mysql:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  rabbitmq:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  backend:
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/categories || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
